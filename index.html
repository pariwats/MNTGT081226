<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PETALS -->
<div class="petal-layer back"></div>
<div class="petal-layer mid"></div>
<div class="petal-layer front"></div>

<!-- MUSIC BUTTON -->
<button id="musicToggle" class="music-btn">🔊</button>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div id="intro">
    <img src="envelope.png" class="envelope">
    <button id="openBtn">Open Invitation</button>
</div>

<!-- WEBSITE -->
<div id="website">

    <!-- COVER -->
    <section class="full-image">
        <img src="cover.png">
    </section>

    <!-- INVITE -->
    <section class="full-image">
        <img src="invite.png">
    </section>

    <!-- COLOR -->
    <section class="center-section">
        <h2>Wedding Color Palette</h2>

        <div class="palette">
      		<div class="color color1" data="#AB9384">#AB9384</div>
		<div class="color color2" data="#D1C7BE">#D1C7BE</div>
		<div class="color color3" data="#ECE4D9">#ECE4D9</div>
		<div class="color color4" data="#E8D6D4">#E8D6D4</div>
		<div class="color color5" data="#EBCFCC">#EBCFCC</div>
		<div class="color color6" data="#D4B0A5">#D4B0A5</div>
        </div>

        <p id="copyMsg"></p>
    </section>

    <!-- BUTTON -->
    <div class="big-buttons">
        <a href="LINK_GOOGLE_MAP" class="map-btn" target="_blank">📍 Google Map</a>
        <a href="LINK_FORM" class="map-btn" target="_blank">💌 แบบสอบถาม</a>
    </div>

    <!-- COUNTDOWN -->
    <section class="center-section">
        <h2>Countdown to Our Wedding</h2>

        <div class="flip-clock">
            <div class="flip-unit">
                <div class="flip-card" id="days">00</div>
                <p>DAYS</p>
            </div>

            <div class="flip-unit">
                <div class="flip-card" id="hours">00</div>
                <p>HOURS</p>
            </div>

            <div class="flip-unit">
                <div class="flip-card" id="minutes">00</div>
                <p>MINUTES</p>
            </div>

            <div class="flip-unit">
                <div class="flip-card" id="seconds">00</div>
                <p>SECONDS</p>
            </div>
        </div>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
